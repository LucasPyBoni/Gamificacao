{% load static %}

<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Envio</title>

    <link rel="stylesheet" href="{% static 'css/login.css' %}" />
  </head>

  <div class="login-wrapper">
    <div class="login-card">
      <div
        style="
          margin: 0 auto 16px auto;
          display: flex;
          align-items: center;
          justify-content: center;
          height: 48px;
          width: 48px;
          border-radius: 50%;
          background-color: #d1fae5;
        "
      >
        <svg
          style="height: 24px; width: 24px; color: #10b981"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4.5 12.75l6 6 9-13.5"
          />
        </svg>
      </div>

      <div class="login-header">
        <h2>E-mail Enviado!</h2>
        <p style="line-height: 1.6">
          Se o endereço estiver cadastrado, você receberá um link seguro para
          criar uma nova senha em instantes.
        </p>
      </div>

      <p
        style="
          font-size: 12px;
          color: var(--text-muted);
          background-color: #f8fafc;
          padding: 12px;
          border-radius: 8px;
          border: 1px solid var(--border-color);
          margin: 0 0 24px 0;
          line-height: 1.5;
        "
      >
        Não recebeu? Verifique sua caixa de spam ou lixo eletrônico.
      </p>

      <a
        href="{% url 'login' %}"
        style="
          display: block;
          width: 100%;
          background-color: var(--primary-color);
          color: #ffffff;
          font-weight: 600;
          padding: 14px 0;
          border-radius: 8px;
          text-decoration: none;
          font-size: 15px;
          transition: background-color 0.3s ease;
        "
        onmouseover="this.style.backgroundColor = 'var(--primary-hover)'"
        onmouseout="this.style.backgroundColor = 'var(--primary-color)'"
      >
        Voltar para o Login
      </a>
    </div>
  </div>
</html>
