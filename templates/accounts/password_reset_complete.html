<style>
  :root {
    --primary-color: #0f172a;
    --primary-hover: #1e293b;
    --bg-gradient: linear-gradient(135deg, #020617 0%, #0f172a 100%);
    --card-bg: rgba(255, 255, 255, 0.95);
    --text-main: #0f172a;
    --text-muted: #64748b;
    --border-color: #cbd5e1;
  }
  body {
    margin: 0;
    padding: 0;
  }
  .login-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: var(--bg-gradient);
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    padding: 20px;
    box-sizing: border-box;
  }
  .login-card {
    background: var(--card-bg);
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    width: 100%;
    max-width: 420px;
    backdrop-filter: blur(10px);
    box-sizing: border-box;
    text-align: center;
  }
  .login-header {
    margin-bottom: 32px;
  }
  .login-header h2 {
    color: var(--text-main);
    font-size: 28px;
    font-weight: 700;
    margin: 0 0 8px 0;
  }
  .login-header p {
    color: var(--text-muted);
    font-size: 14px;
    margin: 0;
  }
</style>

<div class="login-wrapper">
  <div class="login-card">
    <div
      style="
        margin: 0 auto 16px auto;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 48px;
        width: 48px;
        border-radius: 50%;
        background-color: #d1fae5;
      "
    >
      <svg
        style="height: 24px; width: 24px; color: #10b981"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
        />
      </svg>
    </div>

    <div class="login-header">
      <h2>Sucesso!</h2>
      <p>
        Sua nova senha foi gravada com sucesso. Você já pode acessar a sua
        conta.
      </p>
    </div>

    <a
      href="{% url 'login' %}"
      style="
        display: block;
        width: 100%;
        background-color: var(--primary-color);
        color: #ffffff;
        font-weight: 600;
        padding: 14px 0;
        border-radius: 8px;
        text-decoration: none;
        font-size: 15px;
        transition: background-color 0.3s ease;
      "
      onmouseover="this.style.backgroundColor = 'var(--primary-hover)'"
      onmouseout="this.style.backgroundColor = 'var(--primary-color)'"
    >
      Entrar na Conta
    </a>
  </div>
</div>
