{% load static %}

<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login</title>

    <link rel="stylesheet" href="{% static 'css/login.css' %}" />
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-header">
          <h1>Gamificação</h1>

          <p>Faça login ou crie uma conta utilizando dados fictícios.</p>
        </div>

        <form method="POST">
          {% csrf_token %}

          <div class="input-group">
            <label>Usuário</label>

            <input
              type="text"
              name="username"
              placeholder="Digite seu usuário"
              required
            />
          </div>

          <div class="input-group">
            <label>Senha</label>

            <input
              type="password"
              name="password"
              placeholder="Digite sua senha"
              required
            />
          </div>

          <a class="forgot-password" href="{% url 'reset_password' %}">
            Esqueceu a senha?
          </a>

          <button class="btn-login">Entrar</button>
        </form>

        <div class="login-footer">
          Não possui conta?

          <a href="{% url 'cadastro' %}"> Criar conta </a>
        </div>
      </div>
    </div>
  </body>
</html>
