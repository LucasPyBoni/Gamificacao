<style>
  /* Reset & Variáveis de Cores Alteradas para Azul Marinho */
  :root {
    --primary-color: #0f172a; /* Azul marinho escuro principal */
    --primary-hover: #1e293b; /* Tom de azul marinho mais claro para o hover */
    --bg-gradient: linear-gradient(
      135deg,
      #020617 0%,
      #0f172a 100%
    ); /* Gradiente marinho profundo */
    --card-bg: rgba(255, 255, 255, 0.95);
    --text-main: #0f172a; /* Texto alinhado com o azul marinho */
    --text-muted: #64748b;
    --border-color: #cbd5e1;
  }

  body {
    margin: 0;
    padding: 0;
  }

  /* Container Principal (Ocupa a tela toda) */
  .login-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: var(--bg-gradient);
    font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 20px;
    box-sizing: border-box;
  }

  /* Card de Login */
  .login-card {
    background: var(--card-bg);
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    width: 100%;
    max-width: 420px;
    backdrop-filter: blur(10px);
    transition: transform 0.3s ease;
    box-sizing: border-box;
  }

  /* Cabeçalho */
  .login-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .login-header h2 {
    color: var(--text-main);
    font-size: 28px;
    font-weight: 700;
    margin: 0 0 8px 0;
  }

  .login-header p {
    color: var(--text-muted);
    font-size: 14px;
    margin: 0;
  }

  /* Grupos de Input */
  .input-group {
    margin-bottom: 20px;
    position: relative;
  }

  .input-group label {
    display: block;
    color: var(--text-main);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .input-field {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-field .icon {
    position: absolute;
    left: 14px;
    font-size: 16px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
  }
</style>

<div class="login-wrapper">
  <div class="login-card">
    <!-- Cabeçalho -->
    <div class="login-header">
      <h2>Recuperar Senha</h2>
      <p>Insira seu e-mail para receber as instruções de recuperação.</p>
    </div>

    <!-- Formulário -->
    <form
      method="post"
      style="display: flex; flex-direction: column; gap: 20px; margin: 0"
    >
      {% csrf_token %}

      <div class="input-group" style="margin-bottom: 0">
        <label for="id_email">E-mail</label>

        <div class="input-field">
          <!-- Ícone do Envelope -->
          <span class="icon">
            <svg
              xmlns="http://w3.org"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              style="width: 18px; height: 18px"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.92V6.75"
              />
            </svg>
          </span>

          <!-- Input -->
          <input
            type="email"
            name="email"
            id="id_email"
            required
            placeholder="seu-email@exemplo.com"
            style="
              width: 100%;
              padding: 12px 14px 12px 42px;
              border: 1px solid var(--border-color);
              border-radius: 8px;
              outline: none;
              font-size: 15px;
              box-sizing: border-box;
            "
          />
        </div>
      </div>

      <!-- Botão de Envio -->
      <button
        type="submit"
        style="
          width: 100%;
          background-color: var(--primary-color);
          color: #ffffff;
          font-weight: 600;
          padding: 14px 0;
          border-radius: 8px;
          border: none;
          cursor: pointer;
          font-size: 15px;
          transition: background-color 0.3s ease;
          margin-top: 8px;
        "
        onmouseover="this.style.backgroundColor = 'var(--primary-hover)'"
        onmouseout="this.style.backgroundColor = 'var(--primary-color)'"
      >
        Enviar E-mail de Recuperação
      </button>
    </form>

    <!-- Link de Retorno -->
    <div style="text-align: center; margin-top: 24px">
      <a
        href="{% url 'login' %}"
        style="
          font-size: 13px;
          color: var(--text-muted);
          text-decoration: none;
          transition: color 0.2s ease;
        "
        onmouseover="
          this.style.color = 'var(--primary-color)';
          this.style.textDecoration = 'underline';
        "
        onmouseout="
          this.style.color = 'var(--text-muted)';
          this.style.textDecoration = 'none';
        "
      >
        Voltar para o login
      </a>
    </div>
  </div>
</div>
